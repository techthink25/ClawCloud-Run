name: ClawCloud Keep-Alive (OAuth 版)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: 运行自动登录
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_TOKEN: ${{ secrets.GH_PAT }}
          GH_SESSION: ${{ secrets.GH_SESSION }}
        run: |
          cd scripts
          # 验证 gh 是否自动登录成功
          gh auth status
          python auto_login.py --mode cli
