name: ClawCloud Keep-Alive (OAuth 版)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install requests playwright pyNaCl
          playwright install chromium

      - name: 运行自动登录
        env:
          # 使用自定义变量名，避免与 gh 默认的 GH_TOKEN 冲突
          MY_GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO_TOKEN: ${{ secrets.GH_PAT }}
          GH_SESSION: ${{ secrets.GH_SESSION }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd scripts
          # 1. 使用自定义变量登录，避开环境冲突
          echo "$MY_GH_TOKEN" | gh auth login --with-token
          
          # 2. 验证登录状态
          gh auth status
          
          # 3. 运行脚本
          python auto_login.py
